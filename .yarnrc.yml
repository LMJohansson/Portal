nodeLinker: node-modules

# Keep each workspace's dependencies inside its own node_modules instead of
# hoisting them to the root. The @module-federation/bridge-react webpack plugin
# resolves bridge-react and react-router from `<app>/node_modules` (compiler
# context); hoisting would hide them and silently skip its router alias setup.
nmHoistingLimits: workspaces

yarnPath: .yarn/releases/yarn-4.12.0.cjs
