nodeLinker: node-modules

yarnPath: .yarn/releases/yarn-4.12.0.cjs

packageExtensions:
  # @module-federation/dts-plugin requires typescript as a peer but
  # @module-federation/vite doesn't re-declare it, breaking the peer chain.
  "@module-federation/vite@*":
    peerDependencies:
      typescript: "*"
  # @typescript-eslint/typescript-estree (via @typescript-eslint/utils) requires
  # typescript as a peer but @typescript-eslint/utils only declares eslint.
  "@typescript-eslint/utils@*":
    peerDependencies:
      typescript: "*"
