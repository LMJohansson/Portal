quarkus:
  application:
    name: portal-api
    version: 1.0.0

  # ── HTTP ───────────────────────────────────────────────────────────────────
  http:
    port: 8080
    cors:
      enabled: true
      origins: "http://localhost:3000,http://localhost:3001,http://localhost:3002"
      headers: "Accept,Authorization,Content-Type,X-Requested-With"
      methods: "GET,POST,PUT,DELETE,OPTIONS,PATCH"
      access-control-allow-credentials: true

  # ── OIDC (Bearer Token resource server) ────────────────────────────────────
  oidc:
    auth-server-url: ${QUARKUS_OIDC_AUTH_SERVER_URL:http://localhost:8180/realms/portal}
    client-id: portal-shell
    application-type: service
    # Keycloak realm roles are mapped to the "groups" claim by the portal-shell client mapper.
    roles:
      role-claim-path: groups
    # Retry OIDC server connection on startup — gives Keycloak time to become ready in K8s.
    connection-retry-count: 10
    connection-delay: 10

  # ── OpenAPI ────────────────────────────────────────────────────────────────
  swagger-ui:
    always-include: true
    path: /swagger-ui
  smallrye-openapi:
    open-api-version: 3.0.3
    path: /q/openapi
    # Sort operations alphabetically for consistent output
    operation-id-strategy: METHOD

  # ── Health ─────────────────────────────────────────────────────────────────
  smallrye-health:
    root-path: /q/health

  # ── Logging ────────────────────────────────────────────────────────────────
  log:
    level: INFO
    category:
      "com.portal":
        level: DEBUG

  # ── Container Image ────────────────────────────────────────────────────────
  container-image:
    group: portal
    name: portal-api
    tag: latest

"%dev":
  quarkus:
    # ── Database (Dev — H2 in-memory) ────────────────────────────────────────
    datasource:
      db-kind: h2
      jdbc:
        url: "jdbc:h2:mem:portal;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
    hibernate-orm:
      schema-management:
        strategy: drop-and-create
      sql-load-script: import.sql
    # ── OpenAPI ──────────────────────────────────────────────────────────────
    # Store the generated spec next to the static one during build (dev convenience)
    smallrye-openapi:
      store-schema-directory: target/generated-openapi
    # ── Logging ──────────────────────────────────────────────────────────────
    log:
      level: DEBUG
      category:
        "io.quarkus.oidc":
          level: DEBUG

"%prod":
  quarkus:
    # ── Database (Prod — PostgreSQL) ──────────────────────────────────────────
    datasource:
      db-kind: postgresql
      username: ${DB_USER:portal}
      password: ${DB_PASSWORD:portal}
      jdbc:
        url: ${DB_URL:jdbc:postgresql://localhost:5432/portal}
        min-size: 2
        max-size: 10
        initial-size: 2
        acquisition-timeout: 30S
        background-validation: true
        background-validation-interval: PT30S
    hibernate-orm:
      schema-management:
        strategy: none
      sql-load-script: import.sql
