# ── Application ──────────────────────────────────────────────────────────────
quarkus.application.name=portal-api
quarkus.application.version=1.0.0

# ── HTTP ─────────────────────────────────────────────────────────────────────
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:3001,http://localhost:3002
quarkus.http.cors.headers=Accept,Authorization,Content-Type,X-Requested-With
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
quarkus.http.cors.access-control-allow-credentials=true

# ── Database (Dev) ────────────────────────────────────────────────────────────
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:portal;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.hibernate-orm.sql-load-script=import.sql

# ── Database (Production) ─────────────────────────────────────────────────────
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${DB_USER:portal}
%prod.quarkus.datasource.password=${DB_PASSWORD:portal}
%prod.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/portal}
%prod.quarkus.datasource.jdbc.min-size=2
%prod.quarkus.datasource.jdbc.max-size=10
%prod.quarkus.datasource.jdbc.initial-size=2
%prod.quarkus.datasource.jdbc.acquisition-timeout=30S
%prod.quarkus.datasource.jdbc.background-validation=true
%prod.quarkus.datasource.jdbc.background-validation-interval=PT30S
%prod.quarkus.hibernate-orm.database.generation=none
%prod.quarkus.hibernate-orm.sql-load-script=import.sql

# ── JWT ───────────────────────────────────────────────────────────────────────
mp.jwt.verify.issuer=${JWT_ISSUER:https://portal.example.com}
mp.jwt.verify.publickey.location=publicKey.jwk

smallrye.jwt.sign.key.location=privateKey.jwk
smallrye.jwt.new-token.issuer=${JWT_ISSUER:https://portal.example.com}
smallrye.jwt.new-token.lifespan=28800

# ── OpenAPI ───────────────────────────────────────────────────────────────────
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
# Merge the static META-INF/openapi.yaml with annotation-generated spec
# The static file provides the base; annotations enrich it.
quarkus.smallrye-openapi.open-api-version=3.0.3
# Expose generated spec at /q/openapi (YAML) and /q/openapi?format=json (JSON)
quarkus.smallrye-openapi.path=/q/openapi
# Sort operations alphabetically for consistent output
quarkus.smallrye-openapi.operation-id-strategy=METHOD
# Store the generated spec next to the static one during build (dev convenience)
%dev.quarkus.smallrye-openapi.store-schema-directory=target/generated-openapi

# ── Health ────────────────────────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/q/health

# ── Logging ───────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
%dev.quarkus.log.level=DEBUG
quarkus.log.category."com.portal".level=DEBUG

# ── Container Image ───────────────────────────────────────────────────────────
quarkus.container-image.group=portal
quarkus.container-image.name=portal-api
quarkus.container-image.tag=latest
