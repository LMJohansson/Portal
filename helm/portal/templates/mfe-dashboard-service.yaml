apiVersion: v1
kind: Service
metadata:
  name: {{ include "portal.fullname" . }}-mfe-dashboard
  labels:
    {{- include "portal.labels" . | nindent 4 }}
    app.kubernetes.io/component: mfe-dashboard
spec:
  type: {{ .Values.service.mfeDashboard.type }}
  selector:
    {{- include "portal.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mfe-dashboard
  ports:
    - port: 80
      targetPort: 8080
      {{- if and (eq .Values.service.mfeDashboard.type "NodePort") .Values.service.mfeDashboard.nodePort }}
      nodePort: {{ .Values.service.mfeDashboard.nodePort }}
      {{- end }}
