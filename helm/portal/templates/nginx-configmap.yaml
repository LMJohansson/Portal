apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "portal.fullname" . }}-nginx
  labels:
    {{- include "portal.labels" . | nindent 4 }}
data:
  # ── MFE nginx config (mfe-home, mfe-dashboard, mfe-hello) ───────────────
  mfe.conf: |
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /remoteEntry.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Access-Control-Allow-Origin *;
        }

        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Access-Control-Allow-Origin *;
        }

        gzip on;
        gzip_types text/plain text/css application/javascript application/json;
    }

  # ── Shell nginx config (portal-shell) ────────────────────────────────────
  # proxy_pass target is the Helm-rendered service name for portal-api
  shell.conf: |
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_pass http://{{ include "portal.fullname" . }}-api:8080/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        gzip on;
        gzip_types text/plain text/css application/javascript application/json;
    }
