apiVersion: v1
kind: Service
metadata:
  name: {{ include "portal.fullname" . }}-postgres
  labels:
    {{- include "portal.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  selector:
    {{- include "portal.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
  ports:
    - port: 5432
      targetPort: 5432
