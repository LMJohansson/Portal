apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "portal.fullname" . }}-mfe-home
  labels:
    {{- include "portal.labels" . | nindent 4 }}
    app.kubernetes.io/component: mfe-home
spec:
  replicas: {{ .Values.mfeHome.replicaCount }}
  selector:
    matchLabels:
      {{- include "portal.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mfe-home
  template:
    metadata:
      labels:
        {{- include "portal.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mfe-home
    spec:
      containers:
        - name: mfe-home
          image: "{{ .Values.mfeHome.image.repository }}:{{ .Values.mfeHome.image.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: mfe.conf
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.mfeHome.resources | nindent 12 }}
      volumes:
        - name: nginx-conf
          configMap:
            name: {{ include "portal.fullname" . }}-nginx
