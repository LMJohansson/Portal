apiVersion: v1
kind: Service
metadata:
  name: {{ include "portal.fullname" . }}-api
  labels:
    {{- include "portal.labels" . | nindent 4 }}
    app.kubernetes.io/component: portal-api
spec:
  type: ClusterIP
  selector:
    {{- include "portal.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: portal-api
  ports:
    - port: 8080
      targetPort: 8080
