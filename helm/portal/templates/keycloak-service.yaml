apiVersion: v1
kind: Service
metadata:
  name: {{ include "portal.fullname" . }}-keycloak
  labels:
    {{- include "portal.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
spec:
  type: ClusterIP
  selector:
    {{- include "portal.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
